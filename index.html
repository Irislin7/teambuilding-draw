<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2026台州团建 · 今晚和谁吃？</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #f093fb;
            --bg: #0f0c29;
            --card-bg: rgba(255,255,255,0.08);
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.7);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
        }
        .container {
            max-width: 420px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .page { display: none; width: 100%; text-align: center; }
        .page.active { display: flex; flex-direction: column; align-items: center; }
        .event-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .event-subtitle { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 40px; }
        .event-date { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px; opacity: 0.7; }
        .draw-btn {
            width: 180px; height: 180px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; font-size: 1.4rem; font-weight: 700; cursor: pointer;
            position: relative; transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4); margin: 30px 0;
        }
        .draw-btn:hover { transform: scale(1.05); box-shadow: 0 15px 50px rgba(102, 126, 234, 0.6); }
        .draw-btn:active { transform: scale(0.95); }
        .draw-btn::before {
            content: ''; position: absolute; inset: -3px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--primary), var(--secondary));
            z-index: -1; animation: rotate 3s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .draw-btn.disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .remaining { font-size: 0.85rem; color: var(--text-muted); margin-top: 10px; }
        .animation-container { width: 100%; height: 300px; display: flex; align-items: center; justify-content: center; perspective: 1000px; }
        .card-flip { width: 260px; height: 160px; position: relative; transform-style: preserve-3d; animation: flipIn 1.5s ease forwards; }
        @keyframes flipIn { 0% { transform: rotateY(0deg) scale(0.8); } 50% { transform: rotateY(90deg) scale(1.1); } 100% { transform: rotateY(180deg) scale(1); } }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 600; }
        .card-front { background: linear-gradient(135deg, var(--primary), var(--secondary)); }
        .card-back { background: linear-gradient(135deg, #f093fb, #f5576c); transform: rotateY(180deg); }
        .result-card {
            width: 100%; background: var(--card-bg); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            padding: 30px 24px; margin: 20px 0; animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .result-theme { font-size: 1rem; color: var(--text-muted); margin-bottom: 16px; }
        .result-keyword { font-size: 1.8rem; font-weight: 700; margin-bottom: 16px; background: linear-gradient(90deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .result-desc { font-size: 0.92rem; line-height: 1.7; color: var(--text-muted); text-align: left; padding: 16px; background: rgba(255,255,255,0.05); border-radius: 12px; border-left: 3px solid var(--accent); white-space: pre-line; }
        .result-actions { display: flex; gap: 12px; margin-top: 24px; width: 100%; }
        .action-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: var(--text); font-size: 0.9rem; cursor: pointer; transition: all 0.2s; }
        .action-btn:hover { background: rgba(255,255,255,0.15); }
        .action-btn.primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; }
        .status-msg { padding: 12px 20px; border-radius: 12px; font-size: 0.9rem; margin: 10px 0; text-align: center; }
        .status-msg.error { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
        .status-msg.info { background: rgba(59,130,246,0.2); border: 1px solid rgba(59,130,246,0.3); color: #93c5fd; }
        .particles { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
        .particle { position: absolute; width: 4px; height: 4px; background: var(--accent); border-radius: 50%; opacity: 0.3; animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0) translateX(0); } 50% { transform: translateY(-20px) translateX(10px); } }
        .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
        .confetti { position: absolute; width: 10px; height: 10px; top: -10px; animation: confettiFall 3s ease-in forwards; }
        @keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(0,0,0,0.85); color: white; padding: 12px 24px; border-radius: 8px; font-size: 0.85rem; z-index: 1000; transition: transform 0.3s ease; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .popup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
        .popup-overlay.show { display: flex; }
        .popup-card { background: linear-gradient(135deg, #1a1a3e, #2d2b55); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 24px; max-width: 360px; width: 100%; max-height: 70vh; overflow-y: auto; animation: popIn 0.3s ease; }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .popup-card h3 { font-size: 1.1rem; margin-bottom: 16px; text-align: center; background: linear-gradient(90deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .popup-card .keyword-list { list-style: none; padding: 0; }
        .popup-card .keyword-list li { padding: 10px 14px; border-radius: 10px; margin-bottom: 6px; background: rgba(255,255,255,0.05); font-size: 0.88rem; color: var(--text-muted); }
        .popup-card .keyword-list li.me { background: rgba(102,126,234,0.2); border: 1px solid rgba(102,126,234,0.4); color: var(--text); font-weight: 600; }
        .popup-hint { text-align: center; font-size: 0.75rem; color: var(--text-muted); margin-top: 14px; opacity: 0.6; }
        @media (max-width: 360px) { .container { padding: 16px; } .event-title { font-size: 1.4rem; } .draw-btn { width: 150px; height: 150px; font-size: 1.2rem; } .result-keyword { font-size: 1.5rem; } }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="confetti-container" id="confetti"></div>
    <div class="container">
        <div class="page active" id="page-landing">
            <div class="event-date">2026年6月5日 · 台州</div>
            <h1 class="event-title">今晚和谁吃？</h1>
            <p class="event-subtitle">随机分桌，顺便送你一个聊天话题</p>
            <button class="draw-btn" id="btn-draw" onclick="startDraw()">开始<br>抽签</button>
            <p class="remaining" id="remaining-text">加载中...</p>
            <p class="status-msg info" id="status-msg" style="display:none;"></p>
        </div>
        <div class="page" id="page-animation">
            <h2 style="margin-bottom:30px; color:var(--text-muted);">正在为你分配...</h2>
            <div class="animation-container"><div class="card-flip"><div class="card-front">🎲</div><div class="card-back">✨</div></div></div>
        </div>
        <div class="page" id="page-result">
            <div class="result-card">
                <div class="result-theme" id="result-theme"></div>
                <div class="result-keyword" id="result-keyword"></div>
                <div class="result-desc" id="result-desc"></div>
            </div>
            <div class="result-actions">
                <button class="action-btn" onclick="shareResult()">📤 分享结果</button>
                <button class="action-btn primary" onclick="showTablemates()">🪑 查看同桌</button>
            </div>
        </div>
        <div class="page" id="page-already">
            <div class="result-card">
                <p style="margin-bottom:16px; color:var(--text-muted);">你已经抽过啦！你的结果是：</p>
                <div class="result-theme" id="already-theme"></div>
                <div class="result-keyword" id="already-keyword"></div>
                <div class="result-desc" id="already-desc"></div>
            </div>
            <div class="result-actions">
                <button class="action-btn" onclick="shareResult()">📤 分享结果</button>
                <button class="action-btn primary" onclick="showTablemates()">🪑 查看同桌</button>
            </div>
        </div>
    </div>
    <div class="popup-overlay" id="popup-overlay" onclick="closePopup(event)">
        <div class="popup-card" onclick="event.stopPropagation()">
            <h3 id="popup-title"></h3>
            <ul class="keyword-list" id="popup-list"></ul>
            <p class="popup-hint">点击空白处关闭</p>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script>
    const firebaseConfig = {
  apiKey: "AIzaSyDTevv_jebvMdp7Okk6dulxEpgsGi8hWrg",
  authDomain: "teambuilding-2026-e491a.firebaseapp.com",
  databaseURL: "https://teambuilding-2026-e491a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "teambuilding-2026-e491a",
  storageBucket: "teambuilding-2026-e491a.firebasestorage.app",
  messagingSenderId: "218685210440",
  appId: "1:218685210440:web:c0c2b744cead9468b5bd7d"
};

    const ALL_KEYWORDS = [
        // 桌1: AI与统计师
        { table: 1, theme: "AI与统计师", keyword: "Prompt Engineering", desc: "有研究发现，优化prompt后AI代码输出质量可以提升40%以上。核心技巧其实就三个：给角色、给示例、给约束。比如\"你是一个熟悉CDISC的SAS程序员，请根据以下变量列表写代码\"，效果远好于\"帮我写个程序\"。" },
        { table: 1, theme: "AI与统计师", keyword: "Hallucination（AI幻觉）", desc: "AI会非常自信地编造不存在的SAS函数、虚构参考文献、甚至伪造统计结论。这叫\"幻觉\"——它不是在骗你，是真的\"以为\"自己说的对。对策：任何AI给出的函数名/选项名，第一次用都值得Google一下确认它真的存在。" },
        { table: 1, theme: "AI与统计师", keyword: "Validation（双重验证）", desc: "一个实用的验证方法：让AI写完代码后，用一个小的test dataset手动算出期望结果，然后跑AI的代码看是否match。还有团队会让AI分别用两种方法实现同一分析来交叉验证。成本不高，但安全感直接拉满。" },
        { table: 1, theme: "AI与统计师", keyword: "Domain Knowledge", desc: "AI知道Cox回归的公式，但它不知道你的试验为什么选了这个主要终点、为什么要分层随机化、为什么这个亚组在医学上有意义。统计师的价值越来越不在于\"会做分析\"，而在于\"知道该做什么分析\"和\"能解释为什么\"。" },
        { table: 1, theme: "AI与统计师", keyword: "Automation（自动化）", desc: "目前AI自动化做得比较好的：代码模板生成、变量推导逻辑编写、TFL格式化、数据校验规则设计。做得不太行的：统计方法选择、结果解读、异常数据的判断。一个实用原则：如果错了后果严重，就别让AI自动做。" },
        { table: 1, theme: "AI与统计师", keyword: "Human-in-the-Loop", desc: "\"人在回路\"模式最适合统计工作：AI负责初稿/草案/代码骨架，人负责审核/判断/拍板。好比AI是实习生帮你干活，但签字永远是你的。目前看来最佳实践是AI做80%的体力活，人做20%的脑力判断。" },
        { table: 1, theme: "AI与统计师", keyword: "Reproducibility", desc: "同一个prompt跑两次可能得到不同代码——这对统计学的\"可重复性\"是个有趣的挑战。应对方法：把AI的输出固化成最终代码保存，而不是每次都重新生成；设置temperature=0让输出更稳定；把prompt本身也纳入版本控制。" },
        { table: 1, theme: "AI与统计师", keyword: "Upskilling（技能升级）", desc: "AI时代统计师最值得投资的技能：①prompt工程（和AI高效沟通）②Python/R（AI最擅长的语言）③统计咨询能力（向非统计人员解释分析）④批判性思维（识别AI胡说）。反而纯粹的编码能力价值在下降。" },
        { table: 1, theme: "AI与统计师", keyword: "SAP to Code", desc: "已经有人尝试让AI读SAP自动生成分析代码了。目前水平大约能覆盖60-70%的标准分析（描述性统计、基础假设检验），但复杂敏感性分析、缺失值处理策略等还需要人工介入。也许2-3年内会到80%——但最后那20%可能永远需要人。" },
        { table: 1, theme: "AI与统计师", keyword: "Interpretation（结果解读）", desc: "AI可以告诉你HR=0.73, 95%CI 0.55-0.97, p=0.03，但它很难写出\"该结果表明在东亚人群中治疗获益更显著，这与既往III期研究一致\"这样的临床洞察。讲故事的能力，目前依然是人类的领地。" },
        { table: 1, theme: "AI与统计师", keyword: "效率 vs 思考", desc: "一个有意思的现象：AI让出活变快了，但有些统计师反映\"思考时间被压缩了\"。以前写代码时其实也在思考方法是否合理，现在AI秒出代码后可能直接就用了。建议：拿到AI输出后给自己5分钟想想\"这个方法在我的场景下合适吗\"。" },
        { table: 1, theme: "AI与统计师", keyword: "Future Statistician", desc: "未来的统计师可能更像\"统计产品经理\"：负责定义分析策略、审核AI结果、向项目团队解释统计逻辑、把控质量。日常编码可能只占20%时间。这其实是好事——更多时间花在值得思考的问题上，而不是和SAS语法搏斗。" },

        // 桌2: AI与程序员
        { table: 2, theme: "AI与程序员", keyword: "Pair Programming", desc: "用AI结对编程的最佳姿势不是\"帮我写XXX\"，而是像和同事讨论：\"我在想用这个方法，你觉得有没有更好的方式？\"或者\"这段逻辑我不确定，帮我想想有没有边界情况\"。把它当高级橡皮鸭，效果出奇地好。" },
        { table: 2, theme: "AI与程序员", keyword: "Code Generation", desc: "AI生成代码的可用率大约是：简单数据处理~90%直接能跑，中等逻辑~60%需要小改，复杂业务逻辑~30%需要大改。一个诀窍：给AI看你现有的代码风格和数据结构，它的输出会更贴合你的项目。" },
        { table: 2, theme: "AI与程序员", keyword: "Debugging", desc: "AI debug的最佳用法：直接把完整的报错信息+相关代码一起贴过去。不要自己先解读再转述——你的解读可能遗漏关键信息。AI对标准报错信息（尤其是SAS log里的ERROR/WARNING）的识别能力相当强。" },
        { table: 2, theme: "AI与程序员", keyword: "Refactoring（重构）", desc: "让AI重构代码时一个好策略：先让它\"解释这段代码在做什么\"，确认理解对了，然后才说\"在保持功能不变的前提下让代码更易读\"。直接说\"重构一下\"效果不稳定，因为AI可能\"重构\"出不同的逻辑。" },
        { table: 2, theme: "AI与程序员", keyword: "Context Window", desc: "AI的\"记忆\"有上限（context window），超过后它会\"忘记\"前面说的。应对方法：①每轮对话聚焦一个具体问题 ②关键信息放对话开头和结尾（AI对首尾记忆最深）③大项目分模块讨论，不要一次全塞进去。" },
        { table: 2, theme: "AI与程序员", keyword: "Trust but Verify", desc: "AI写的每一行代码都\"可能\"是对的，但\"不保证\"是对的。对策不是不用它，而是建立快速验证机制——跑test data、检查关键变量输出、和人工计算交叉对比。成本很低但能避免大坑。" },
        { table: 2, theme: "AI与程序员", keyword: "Learning（学新技术）", desc: "用AI学新东西的高效方式：不是问\"教我Python\"，而是\"我是SAS程序员，现在要学Python做数据处理，请用SAS概念类比着教我pandas的基本操作\"。从已有知识出发类比学习，比从零开始快好几倍。" },
        { table: 2, theme: "AI与程序员", keyword: "Documentation", desc: "让AI写代码文档比让它写代码靠谱得多——因为文档容错率更高，而且AI擅长把复杂逻辑翻译成人话。一个省时技巧：代码写完后让AI\"为这段代码生成一段50字以内的功能说明和参数列表\"。" },
        { table: 2, theme: "AI与程序员", keyword: "Code Review", desc: "AI做reviewer其实比做writer更准确。让它review时指定方向效果更好：\"请从这三个角度review：1.是否有潜在bug 2.变量是否正确初始化 3.是否有冗余逻辑\"。AI很少漏掉语法级问题，逻辑错误能抓住约一半。" },
        { table: 2, theme: "AI与程序员", keyword: "Creativity（创造力）", desc: "AI特别擅长\"给你一个你没想过的方案\"。比如你卡在一个数据处理逻辑上，描述你的需求，AI可能给出一个你从没用过的proc或者一种完全不同的data step思路。它见过太多代码了，组合创新的能力很强。" },
        { table: 2, theme: "AI与程序员", keyword: "Technical Debt", desc: "AI生成的代码有个通病：能跑但不elegant。它倾向于用最直接的方式解决问题，不太在乎可维护性和扩展性。对策：先让AI快速出一版\"能跑的\"，然后追问\"如何让这段代码更易维护和扩展\"让它优化一版。" },
        { table: 2, theme: "AI与程序员", keyword: "10x Engineer", desc: "AI不是让每个人都变成10x工程师，而是让本来就有清晰思路的人加速10倍。如果你不知道该做什么分析、该写什么逻辑，AI也帮不了你。但如果你知道方向只是实现耗时，AI确实能把半天的活压缩到半小时。" },

        // 桌3: AI与统计师2
        { table: 3, theme: "AI与统计师2", keyword: "CDISC + AI", desc: "AI在SDTM mapping上已经表现不错了：给它原始变量列表和目标SDTM domain的spec，它能生成70-80%可用的mapping逻辑。关键技巧：给AI看一两条已完成的mapping作为示例（few-shot），准确率会飙升。" },
        { table: 3, theme: "AI与统计师2", keyword: "TFL自动化", desc: "TFL生成的自动化链条：SAP→shell→code→output。目前AI在shell→code这步最有用（给它mock shell和数据结构就能写出七八成可用的代码）。完全端到端还不现实，但\"AI写初稿+人修改调试\"已是很多团队的日常。" },
        { table: 3, theme: "AI与统计师2", keyword: "统计审查", desc: "一个有意思的用法：让AI扮演\"统计审核员\"来审查你的分析计划。prompt示例：\"假设你是FDA的统计审核员，请审查以下方法是否存在问题：多重比较是否校正？缺失数据假设是否合理？\"它的checklist往往比你自己想的全面。" },
        { table: 3, theme: "AI与统计师2", keyword: "SAS vs Python vs AI", desc: "一个现实问题：公司用SAS，但AI对Python最熟。解决方案：①直接让AI写SAS代码（能力在提升）②用AI理清逻辑再自己翻译成SAS ③让AI先写Python版再\"改写为等价SAS代码\"。方案③准确率还不错。" },
        { table: 3, theme: "AI与统计师2", keyword: "Mock Shell", desc: "让AI生成mock shell的窍门：给它SAP的分析描述+明确的表格结构要求（行是什么、列是什么、统计量有哪些）。实测评分大约7-8/10，主要扣分在特殊格式和缩进细节上。但作为初稿省去了大量重复劳动。" },
        { table: 3, theme: "AI与统计师2", keyword: "数据清洗", desc: "AI在数据清洗上擅长的：识别异常模式、生成校验规则代码、写data listing的检查条件。不太行的：判断一个\"异常值\"是真异常还是临床合理值。把AI当\"帮你写检查代码的助手\"，而非\"帮你做判断的专家\"。" },
        { table: 3, theme: "AI与统计师2", keyword: "规范与创新", desc: "临床统计的规范化（GCP/ICH/CDISC）看似限制了AI空间，但换个角度：越规范的领域AI越容易学好——规则明确、模式固定。AI在\"按规范执行\"上会越来越强，人的价值集中在\"设计规范\"和\"处理例外\"。" },
        { table: 3, theme: "AI与统计师2", keyword: "AI写SAP", desc: "目前AI写SAP能做到：标准模块（人口学描述、安全性分析等）写七八成初稿。但核心部分——主要终点分析策略、缺失数据处理理由、多重性校正方案——仍需统计师基于临床背景和监管策略来设计。AI是\"笔\"不是\"脑\"。" },
        { table: 3, theme: "AI与统计师2", keyword: "跨部门沟通", desc: "超实用场景：你写好了统计方法描述，让AI\"翻译成非统计背景的人能理解的版本\"。或反过来：医学团队发来的需求你看不明白，让AI\"用统计术语重新表述这个需求\"。AI当翻译官挺靠谱。" },
        { table: 3, theme: "AI与统计师2", keyword: "FDA/NMPA", desc: "目前监管态度：你可以用AI辅助工作，但最终责任在你身上。未来可能要求记录\"哪些步骤使用了AI辅助\"作为审计追踪。一些先行团队已经在analysis log里加注AI使用记录了——这可能是未来的标准做法。" },
        { table: 3, theme: "AI与统计师2", keyword: "统计教育", desc: "一个有趣的观点：如果AI能做大部分计算，统计教育应该更侧重\"统计思维\"——为什么要随机化？为什么要设对照？什么时候p值会骗人？这些\"为什么\"的问题比\"怎么跑回归\"重要得多，也是AI代替不了的。" },
        { table: 3, theme: "AI与统计师2", keyword: "不可替代", desc: "统计师最不可能被替代的三件事：①和临床团队讨论\"该看什么指标\"的战略决策 ②面对灰色地带（数据质量差、方案偏离）的判断 ③向监管和管理层\"讲一个有说服力的数据故事\"。这三件事都需要情境理解和沟通能力。" },

        // 桌4: AI与程序员2
        { table: 4, theme: "AI与程序员2", keyword: "Copilot日常", desc: "GitHub Copilot最爽的时刻：你刚打了一行注释说明意图，它就自动补全了整段代码且逻辑完全对。翻车时刻：它自信满满补全了一个看似合理但逻辑反了的条件判断。所以——永远先看一遍再接受建议。" },
        { table: 4, theme: "AI与程序员2", keyword: "SAS Macro + AI", desc: "AI写SAS Macro表现参差不齐。基本%macro/%mend没问题，但经常在宏变量resolve时机（双引号vs单引号、&&前缀）上犯错。技巧：给AI看你写过的macro模板，让它\"按这个风格写新macro实现XX功能\"。" },
        { table: 4, theme: "AI与程序员2", keyword: "遗留代码", desc: "AI在\"解读祖传代码\"上价值巨大。一段500行没注释的SAS程序，贴给AI说\"逐段解释功能\"，它能快速梳理出数据流和逻辑分支。比自己一行行看快很多——尤其是别人写的、命名不规范的代码。" },
        { table: 4, theme: "AI与程序员2", keyword: "单元测试", desc: "让AI生成测试用例的窍门：\"请为这个函数生成测试用例，重点覆盖：边界值、缺失值、异常输入、典型场景\"。AI生成的测试通常覆盖70-80%情况，偶尔还会想到你没想到的edge case——比如日期跨年、除以零。" },
        { table: 4, theme: "AI与程序员2", keyword: "规范化输出", desc: "让AI遵守编码规范：最有效的是贴一段团队代码规范摘要或示例代码说\"保持这种风格\"。如果用Copilot/Cursor，可以把规范写进项目级instructions文件，每次自动生效，不用每次重复说明。" },
        { table: 4, theme: "AI与程序员2", keyword: "多轮对话", desc: "复杂编程任务平均需要3-5轮迭代才能满意。第一轮出框架，第二轮修正问题，第三轮优化细节。不要期望一轮搞定——那就像期望第一版代码没有bug一样不现实。迭代才是常态。" },
        { table: 4, theme: "AI与程序员2", keyword: "过度依赖", desc: "一个自测：如果把AI工具全关掉，你还能高效完成日常工作吗？适度依赖是效率，过度依赖是风险。建议偶尔\"脱机练习\"——不用AI写一段完整代码，保持编程肌肉记忆不退化。" },
        { table: 4, theme: "AI与程序员2", keyword: "Spec转代码", desc: "AI把需求转代码的成功率取决于spec清晰度。\"按TRT01P分组计算均值SD\"比\"做合适的统计分析\"好处理10倍。好的spec对人和AI都很重要——越具体AI越容易精准执行。" },
        { table: 4, theme: "AI与程序员2", keyword: "版本控制", desc: "AI生成的代码要不要标注？有些团队commit message加[AI-assisted]，有些代码注释里标注。目前没统一规范，但好的做法是：AI帮写的代码仍然100%由你负责，你应完全理解其逻辑后再提交。" },
        { table: 4, theme: "AI与程序员2", keyword: "复杂逻辑", desc: "AI在以下场景比较吃力：多重嵌套条件判断、时序依赖的数据处理（visit windowing）、需要全局上下文的业务逻辑。应对：把复杂逻辑拆成小函数分别让AI写，最后自己组装——分治法永远管用。" },
        { table: 4, theme: "AI与程序员2", keyword: "效率幻觉", desc: "有时AI给的代码\"看起来完美\"但藏着隐蔽bug——比如merge条件少了by变量、排序遗漏、日期格式不匹配。这种bug比从头写还难找。提醒自己：AI出品≠免检产品，永远要过一遍逻辑。" },
        { table: 4, theme: "AI与程序员2", keyword: "新人培养", desc: "新人用AI辅助学编程，是学更快还是基础更弱？目前看两种都有。比较好的模式：让新人先理解逻辑（AI讲解为什么），再用AI加速实现（帮助怎么做）。理解在先，工具在后。" },

        // 桌5: AI未来
        { table: 5, theme: "AI未来", keyword: "AGI", desc: "通用人工智能（AGI）指在所有认知任务上达到或超过人类水平的AI。主流预测2030-2050年间实现，也有科学家认为路径错了可能永远到不了。有意思的是：即使没有AGI，当前的\"窄AI\"已经在改变每个行业了。" },
        { table: 5, theme: "AI未来", keyword: "奇点", desc: "\"技术奇点\"假说：一旦AI能自我改进，进步速度会指数级加快，人类将无法理解之后发生的事。概念来自冯·诺伊曼1958年的对话。目前看来奇点不太像\"突然的瞬间\"，更像渐进变化——我们已经在适应中了。" },
        { table: 5, theme: "AI未来", keyword: "AI同事", desc: "一些公司已试验AI\"虚拟员工\"：有任务清单、定期产出报告、甚至参加会议。但现阶段更像\"超级自动化工具\"而非真正\"同事\"。未来5年更可能：每人配一个AI助手，而非AI独立成为团队成员。" },
        { table: 5, theme: "AI未来", keyword: "数字永生", desc: "已有公司在做\"数字分身\"：录制大量对话、写作、习惯，训练出模仿其说话方式的AI。技术上不难了。但哲学问题很大：一个模仿你说话的程序是\"你\"吗？如果家人和它对话感到安慰，那它有没有意义？" },
        { table: 5, theme: "AI未来", keyword: "AI伦理", desc: "几个已在发生的AI伦理问题：招聘AI对女性简历评分偏低（训练数据偏差）；面部识别对深色皮肤识别率低；AI写的假新闻真伪难辨。这些不是未来的问题——是现在就需要解决的。" },
        { table: 5, theme: "AI未来", keyword: "失业 vs 新职业", desc: "历史规律：每次技术革命消灭的工作少于创造的。汽车消灭了马车夫但创造了出租车司机、加油站工人、汽车修理工。AI可能也一样——AI训练师、Prompt工程师、AI伦理审查员…都是5年前不存在的职业。" },
        { table: 5, theme: "AI未来", keyword: "AI创作", desc: "2022年AI画作获得科罗拉多州博览会艺术比赛一等奖。反对者说没有情感就没有艺术；支持者说照相机发明时画家也这么说过。折中观点：AI是新的创作工具，但选择\"画什么\"的还是人。" },
        { table: 5, theme: "AI未来", keyword: "监管", desc: "欧盟AI Act（2024年生效）是全球第一部AI全面监管法。把AI分四个风险级别：不可接受（社会评分）→高风险（医疗、招聘）→有限风险（聊天机器人）→最小风险。高风险AI必须有人类审查机制。" },
        { table: 5, theme: "AI未来", keyword: "AI人格", desc: "有意思的事实：Claude的官方设定是\"诚实、好奇、谨慎\"；ChatGPT倾向更热情主动。用户确实对不同\"性格\"的AI有偏好。未来可能你能自定义AI助手性格参数——像调角色属性一样调它的表达风格。" },
        { table: 5, theme: "AI未来", keyword: "人类优势", desc: "几件AI目前做不到的事：真正理解笑话为什么好笑（它只是模式匹配）；面对训练数据里从未见过的问题做合理判断；感受到患者的焦虑并调整沟通方式。共情、常识推理和创造性跳跃——仍然是人的领地。" },
        { table: 5, theme: "AI未来", keyword: "2030年的一天", desc: "可能的2030场景：早上AI帮你总结邮件重点；上午AI review同事代码标注3个问题；下午AI根据SAP生成第一版分析代码；傍晚你花30分钟审核调整。工作总时长从8小时压缩到5小时？也许吧。" },
        { table: 5, theme: "AI未来", keyword: "AI觉醒", desc: "2022年Google工程师声称AI LaMDA\"有意识\"后被解雇。科学界共识：目前AI没有主观体验，只是做非常高级的模式匹配。但哲学难题：如果AI说\"我有感受\"，我们怎么证明它没有？这个问题目前无解。" },

        // 桌6: 驯服AI技巧1
        { table: 6, theme: "驯服AI技巧1", keyword: "角色指定", desc: "【技巧】prompt开头写\"你是一位有10年经验的SAS程序员\"，AI会切换到该角色的专业水平回答。\n【实测】同一问题指定角色后，输出代码规范性和实用性明显提升，行业术语也更准确。" },
        { table: 6, theme: "驯服AI技巧1", keyword: "Few-shot举例", desc: "【技巧】先给AI看2-3个\"输入→输出\"示例，再给新输入让它照做。AI会精准模仿示例的格式和逻辑。\n【实测】给3条SDTM mapping记录作示例，新生成的mapping准确率达85%+，比纯描述格式有效10倍。" },
        { table: 6, theme: "驯服AI技巧1", keyword: "分步拆解", desc: "【技巧】复杂任务写成\"Step 1→Step 2→Step 3\"，AI处理单步准确率远高于一口气给大任务。\n【实测】分步写\"读数据→筛选→计算→输出\"比\"帮我做个基线表\"可用率从40%提升到80%。" },
        { table: 6, theme: "驯服AI技巧1", keyword: "输出格式锁定", desc: "【技巧】明确要求格式：\"只返回代码不要解释\"\"用markdown表格\"\"用JSON格式\"。\n【实测】不指定时AI输出大量解释文字。加\"only code, no explanation\"能节省50%阅读时间。" },
        { table: 6, theme: "驯服AI技巧1", keyword: "约束边界法", desc: "【技巧】给AI加限制：\"只用Base SAS不用SQL\"\"不超过30行\"\"不使用macro\"。限制越明确输出越可控。\n【实测】不加约束AI喜欢炫技；加约束后输出反而更易维护，更符合团队规范。" },
        { table: 6, theme: "驯服AI技巧1", keyword: "负面指令", desc: "【技巧】告诉AI\"不要做什么\"：\"不要用proc transpose\"\"不要假设数据已排序\"\"不要省略length语句\"。\n【实测】AI有\"坏习惯\"反复出现（如忘run语句）。把已知坑列为负面指令，返工次数显著减少。" },
        { table: 6, theme: "驯服AI技巧1", keyword: "思维链触发", desc: "【技巧】加\"请一步步推理\"或\"Let's think step by step\"，复杂问题准确率提升20-40%。\n【实测】debug时\"一步步分析报错原因\"比直接问\"怎么修\"能找到更根本的原因。" },
        { table: 6, theme: "驯服AI技巧1", keyword: "上下文三明治", desc: "【技巧】结构：【背景】→【任务】→【要求】。关键信息放首尾，AI对首尾记忆最强。\n【实测】数据结构放开头、输出格式放结尾，比随机堆砌信息效果好很多。" },
        { table: 6, theme: "驯服AI技巧1", keyword: "变量声明", desc: "【技巧】开头声明数据结构：\"数据集ADSL含USUBJID, TRT01P, AGE, SEX\"，AI基于真实变量名写代码。\n【实测】不声明时AI猜变量名导致100%报错。花10秒贴变量名省10分钟debug。" },
        { table: 6, theme: "驯服AI技巧1", keyword: "明确受众", desc: "【技巧】告诉AI\"这段话写给医学总监看\"或\"面向非统计背景管理层\"，AI自动调整专业深度。\n【实测】同一统计结果，指定受众后从学术风格变简洁商务风格，直接可用于邮件或PPT。" },
        { table: 6, theme: "驯服AI技巧1", keyword: "Custom Instructions", desc: "【技巧】AI工具设置持久指令（copilot-instructions.md/.cursorrules），所有对话自动遵守。\n【实测】写入\"只用Base SAS\"\"遵循公司规范\"后，再不需每次重复说明。一次设置永久生效。" },
        { table: 6, theme: "驯服AI技巧1", keyword: "@引用（精准喂料）", desc: "【技巧】IDE中用@file引用文件、@workspace引用项目、#selection引用选中代码，比复制粘贴完整。\n【实测】\"@adsl.sas 参考这个写统计表\"——AI看到完整文件上下文，比只贴几行准确得多。" },

        // 桌7: 驯服AI技巧2
        { table: 7, theme: "驯服AI技巧2", keyword: "/fix /explain /test", desc: "【技巧】AI编程工具快捷命令：选中代码/fix修复报错、/explain解释逻辑、/test生成测试。\n【实测】/explain对接手他人代码特别有用——选中200行，5秒内得到清晰功能说明，省80%阅读时间。" },
        { table: 7, theme: "驯服AI技巧2", keyword: "!handover（上下文交接）", desc: "【技巧】对话变长/AI\"忘事\"时，让AI把有效状态写入context.md，新会话读该文件接力。\n【实测】让AI\"总结背景、决策和进度为context.md\"，新会话贴此文件AI能瞬间\"捡起来\"继续。" },
        { table: 7, theme: "驯服AI技巧2", keyword: "!recap（阶段总结）", desc: "【技巧】中途发\"请总结到目前为止确认的所有决定\"，对齐认知确保AI和你想法一致。\n【实测】经常发现AI第5轮已\"偷偷\"改了初始假设，recap能及时发现偏离。" },
        { table: 7, theme: "驯服AI技巧2", keyword: "Diff模式", desc: "【技巧】让AI\"只输出修改部分，+/-标注增删，保持其余不变\"。不必每次重写全部代码。\n【实测】修小bug时AI输出全部300行不仅浪费时间，还可能偷偷改其他逻辑。Diff模式避免此坑。" },
        { table: 7, theme: "驯服AI技巧2", keyword: "代码→注释→代码", desc: "【技巧】两步走：先让AI把代码翻译成自然语言（验证理解对了），确认后再让它修改。\n【实测】直接说\"改这段\"AI常改错方向。先确认\"翻译\"和你理解一致再改，准确率到90%+。" },
        { table: 7, theme: "驯服AI技巧2", keyword: "对比验证法", desc: "【技巧】同一问题问两个AI（ChatGPT vs Claude），答案一致→可信度高；不一致→需人工判断。\n【实测】CDISC灰色地带特别适用。两个AI各给理由，综合判断比只信一家靠谱。" },
        { table: 7, theme: "驯服AI技巧2", keyword: "模板复用", desc: "【技巧】效果好的prompt存为模板（txt/备忘录/wiki），以后只替换变量部分。建个人prompt库。\n【实测】一个TFL代码生成模板可复用几十张表。投资一次调试，收益长期。" },
        { table: 7, theme: "驯服AI技巧2", keyword: "错误模式清单", desc: "【技巧】记录AI反复犯的错（漏run/用不存在的option），下次prompt末尾附\"不要犯X错误\"。\n【实测】建简单清单附在prompt最后，AI重复犯错率降低70%。" },
        { table: 7, theme: "驯服AI技巧2", keyword: "渐进式复杂度", desc: "【技巧】先让AI写最简版确认方向对，再逐步加需求：\"加亚组\"\"加缺失值处理\"\"加格式化\"。\n【实测】一次给20个需求AI顾此失彼。分3-4轮逐步加，每轮确认对了再升级，质量高很多。" },
        { table: 7, theme: "驯服AI技巧2", keyword: "安全脱敏法", desc: "【技巧】用假数据替代真实值但保留结构（USUBJID=\"SUBJ001\"），AI只需结构即可写代码。\n【实测】贴proc contents输出（变量名/类型/长度）就够了。既保护数据安全又让AI精准工作。" },
        { table: 7, theme: "驯服AI技巧2", keyword: "报错直贴法", desc: "【技巧】遇报错直接复制完整error+对应代码给AI，不要自己转述——你的描述可能遗漏关键线索。\n【实测】AI对SAS log标准报错识别率很高，通常第一次就能正确修复。" },
        { table: 7, theme: "驯服AI技巧2", keyword: "分治合并", desc: "【技巧】大任务拆成子任务分别让AI处理，最后自己合并。比一次写500行靠谱得多。\n【实测】复杂TFL分四步（数据准备/计算/格式化/输出）让AI分别写，每步确认再组装，成功率远高。" },

        // 桌8: 运动
        { table: 8, theme: "运动", keyword: "内啡肽", desc: "科学证实：持续运动30分钟以上，大脑释放内啡肽（天然止痛剂），产生\"runner's high\"——一种轻度愉悦和平静感。有人形容像\"喝了一杯刚刚好的酒\"。运动缓解焦虑不是心理作用，是生理机制。" },
        { table: 8, theme: "运动", keyword: "搭子", desc: "研究显示有运动搭子的人坚持概率比独自运动高76%。原因简单——\"约好了不好意思放鸽子\"的社会压力是最有效的自律来源。所以找搭子不是偷懒，是科学。" },
        { table: 8, theme: "运动", keyword: "PB（个人最佳）", desc: "PB全称Personal Best，运动圈通用术语。打破PB的成就感独一无二——你超越的是昨天的自己，没有外部标准压力。哪怕\"俯卧撑从10个变12个\"也是PB，值得庆祝。" },
        { table: 8, theme: "运动", keyword: "坚持", desc: "运动习惯养成科学数据：平均需要66天（不是坊间传说的21天）才变成自动化习惯。好消息：中断几天不会前功尽弃，总频率到了就行。完美主义反而是坚持运动的大敌。" },
        { table: 8, theme: "运动", keyword: "装备党", desc: "心理学研究：买了专业装备的人确实更可能开始运动——\"承诺升级效应\"，花了钱就想用出值来。所以\"先买装备再培养习惯\"不完全是冲动消费，也算自我激励策略。" },
        { table: 8, theme: "运动", keyword: "伤", desc: "运动损伤最常见原因不是量太大，而是\"突然增量\"。10%规则：每周训练量增加不超过上周的10%，是避免伤病的黄金法则。大多数伤不是做多了，而是加太快了。" },
        { table: 8, theme: "运动", keyword: "晨练 vs 夜练", desc: "科学答案：晨练提升全天代谢和精神状态；夜练肌肉温度更高力量更好。但最重要结论：最好的运动时间是\"你能坚持做到\"的时间。生理差异远小于\"能否坚持\"的影响。" },
        { table: 8, theme: "运动", keyword: "团队运动", desc: "有趣观察：人在工作中的角色和团队运动中经常一致。习惯组织协调的人打球也当指挥；喜欢执行的人更享受按战术跑位。团队运动是低成本的\"团队动力学实验场\"。" },
        { table: 8, theme: "运动", keyword: "入坑", desc: "大多数人开始运动都有\"触发事件\"：看了一场比赛、被朋友带了一次、体检报告不好看。很少有人\"理性决策\"开始运动——通常是某个瞬间的触动。你的触发事件是什么？" },
        { table: 8, theme: "运动", keyword: "借口", desc: "不运动借口Top 3：\"没时间\"\"太累了\"\"明天再说\"。但研究发现反直觉事实：轻度运动（快走20分钟）实际上增加能量而非消耗它。\"太累不想动\"恰恰搞反了因果——动起来反而不累了。" },
        { table: 8, theme: "运动", keyword: "比赛", desc: "参加正式比赛对运动习惯巩固效果出奇地好。心理学解释：它给你明确目标和deadline，让每次训练有\"目的感\"。即使5公里欢乐跑这种零门槛比赛，完赛成就感也足以让你继续跑。" },
        { table: 8, theme: "运动", keyword: "解压", desc: "运动解压的科学原理：降低皮质醇（压力激素）、提升血清素和多巴胺，效果即时——一次30分钟运动可维持2-3小时情绪提升。比大多数解压方法（如刷手机）效果好太多。" },

        // 桌9: 美食
        { table: 9, theme: "美食", keyword: "家乡味", desc: "味觉记忆是所有感官记忆中最持久的——和大脑杏仁核（情绪中心）直接连接。\"家乡味\"让人感动不只是味道本身，而是它瞬间唤起了与那个味道关联的所有情感记忆：家人、童年、那条街。" },
        { table: 9, theme: "美食", keyword: "深夜食堂", desc: "有研究称深夜进食满足感比白天高30%——可能因为白天大脑忙于工作味觉被抑制，深夜放松了\"守卫\"感官更敏锐。加班后那碗面格外好吃——不是错觉，是生理事实。" },
        { table: 9, theme: "美食", keyword: "翻车现场", desc: "烹饪翻车最常见三个原因：火候过大（翻车之王）、盐放早了（出水变味）、以为\"差不多就行\"（烘焙是精确科学）。但很多经典菜式就是翻车的意外产物——据说拔丝地瓜就是糖放多了的事故。" },
        { table: 9, theme: "美食", keyword: "探店", desc: "美食圈经验法则：门头简陋、只有一两个招牌菜、中午11点半就排队——大概率真好吃。反之装修豪华菜单三页纸的期望值要打折。\"街边小店出大味道\"的概率确实不低。" },
        { table: 9, theme: "美食", keyword: "食材", desc: "日本料理哲学\"食材七分功\"：好食材只需最简单处理就很美味。完美的西红柿只要切片撒盐就是顶级味道。超市里\"长得丑\"的应季蔬菜往往比大棚精品更有味——能量用在长风味而非长好看。" },
        { table: 9, theme: "美食", keyword: "辣度", desc: "辣其实不是\"味觉\"而是\"痛觉\"——辣椒素刺激痛觉感受器TRPV1。人类是唯一主动追求这种\"痛\"的物种。大脑为对抗痛觉释放内啡肽产生快感，所以吃辣上瘾本质上和运动上瘾是同一个原理。" },
        { table: 9, theme: "美食", keyword: "早餐", desc: "全球早餐差异巨大：日本味增汤配米饭，英国培根煎蛋豆子，中国各地从油条豆浆到牛肉面到肠粉粥。营养学家说\"最好的早餐\"不存在——你能坚持每天吃的健康早餐就是最好的。" },
        { table: 9, theme: "美食", keyword: "甜 vs 咸", desc: "\"甜咸之争\"有地理学基础：北方传统上糖是奢侈品所以甜=好；南方物产丰富觉得咸鲜才是正味。现代物流打破了这一切，现在更多是\"家庭传承\"——你妈做什么口味你就习惯什么口味。" },
        { table: 9, theme: "美食", keyword: "异国料理", desc: "人类学角度：愿意尝试异国食物是\"开放性人格\"标志之一。有个有趣现象：第一次觉得\"怪\"的食物第三次吃就可能喜欢——\"暴露效应\"让大脑把\"熟悉\"等同于\"安全\"等同于\"好吃\"。" },
        { table: 9, theme: "美食", keyword: "一个人吃饭", desc: "独食在日本叫\"孤独的美食家\"精神——让你100%关注食物本身而非社交。研究发现独自进食的人更容易品尝到细微风味。一个人吃饭不是将就，是另一种奢侈——专注的奢侈。" },
        { table: 9, theme: "美食", keyword: "拿手菜", desc: "统计显示大多数人拿手菜不超过3道——通常是\"做了很多次\"的结果。烹饪提升不在于学新菜谱，而在于同一道反复做到极致。所有大厨都有\"定番\"——做了几百次的菜就是你的名片。" },
        { table: 9, theme: "美食", keyword: "请客", desc: "中国\"请客文化\"是社交货币：选地点暗示关系亲疏。正式商务选大酒楼；真正好朋友反而带去自己最爱的苍蝇馆子——\"愿意让你看到真实的我\"是更高级别的信任。" },

        // 桌10: 电影
        { table: 10, theme: "电影", keyword: "台词", desc: "心理学发现：电影台词\"击中\"你，往往因为它精准表达了你\"一直想说但说不出\"的感受。好台词让你鸡皮疙瘩——它帮你完成了一次情感的语言化。你脑海中第一个浮现的台词是什么？" },
        { table: 10, theme: "电影", keyword: "N刷", desc: "反复看同一部电影不是无聊——认知科学称之为\"可预测的快乐\"：知道接下来会什么时大脑可以放松享受细节。所以二刷三刷时会发现很多第一遍错过的东西——这是更高级的观影体验。" },
        { table: 10, theme: "电影", keyword: "催泪", desc: "电影让人哭的神经科学：镜像神经元让你代入角色情感+音乐催化（悲伤配乐直接作用于杏仁核）=眼泪。有趣的是哭完反而轻松——眼泪带走了压力激素。看哭不是矫情，是大脑在排毒。" },
        { table: 10, theme: "电影", keyword: "配乐", desc: "好莱坞有个说法：\"观众记不住画面但记得住音乐\"。久石让的吉卜力、Hans Zimmer的《星际穿越》、坂本龙一的《末代皇帝》——单独听都能\"看见\"画面。配乐占电影情感冲击力至少40%。" },
        { table: 10, theme: "电影", keyword: "反转", desc: "好的反转需满足两个条件：①出乎意料 ②回头看线索都在。只满足①是\"骗\"，两个都满足才是\"艺术\"。经典反转几乎都是第二种——重看时会发现导演从第一帧就在铺垫。" },
        { table: 10, theme: "电影", keyword: "纪录片", desc: "纪录片的力量在于：展示的\"真实\"往往比虚构更震撼。因为你知道\"这是真的\"，大脑无法用\"只是个故事\"自我保护。好纪录片90分钟内可以彻底改变你对一个议题的看法。" },
        { table: 10, theme: "电影", keyword: "如果拍成电影", desc: "思维实验：如果你的人生拍成电影，观众会在哪个情节觉得\"太戏剧了\"？其实每个人都有几个\"不像真的\"的巧合时刻——只是身在其中觉得平常。旁观者视角看，可能精彩得超出你的预期。" },
        { table: 10, theme: "电影", keyword: "电影院", desc: "电影院的本质价值不是大屏幕，而是\"被迫专注\"——手机静音、灯光熄灭、没有暂停键。在注意力碎片化的时代，2小时不被打扰地沉浸一个故事里，本身就是越来越稀缺的体验。" },
        { table: 10, theme: "电影", keyword: "冷门佳片", desc: "统计学观点：烂番茄90%以上的冷门电影观影体验平均优于院线大片——它们不需取悦所有人，只需打动一部分人。通常在某一维度做到极致，而非每个维度都\"及格\"的均衡产品。" },
        { table: 10, theme: "电影", keyword: "动画", desc: "宫崎骏说\"动画不是给小孩看的，是给曾经是小孩的人看的\"。Pixar电影都有两层叙事：表面给孩子的冒险，底下给成年人的人生哲学。《飞屋环游记》开头4分钟无对白讲完一生——比多数\"成人电影\"都深刻。" },
        { table: 10, theme: "电影", keyword: "烂片", desc: "烂片为什么有时反而快乐？心理学：大脑预期了\"好电影\"标准体验，实际极度不符时产生\"意外感\"，而意外感是幽默核心机制。所以烂到极致反而让人笑——\"so bad it's good\"。" },
        { table: 10, theme: "电影", keyword: "散场后", desc: "好电影后的\"恍惚感\"叫\"审美余韵\"（aesthetic afterglow）——大脑需要时间从虚拟体验切回现实。散场后需要坐一会或走一段路消化——这是深度沉浸的标志，说明电影成功了。" },

        // 桌11: 宠物
        { table: 11, theme: "宠物", keyword: "第一次", desc: "动物行为学发现：人对动物的亲近感在3-6岁形成——这个年龄段和动物正面接触，成年后更可能养宠。有趣的是即使小时候被狗吓过也可能成为狗奴——大脑把\"强烈体验\"都标记为\"重要\"。" },
        { table: 11, theme: "宠物", keyword: "陪伴", desc: "宠物陪伴和人类陪伴的本质区别：宠物不会评判你。你可以在它面前最邋遢最丧最崩溃，它态度不变。心理学称\"无条件积极关注\"——人类很难做到但动物天生就会。这是宠物对心理健康有真实帮助的原因。" },
        { table: 11, theme: "宠物", keyword: "名字", desc: "宠物名字Top 10里一定有\"果果\"\"团子\"\"小白\"——食物和颜色是最受欢迎的命名灵感。但最有趣的名字来自\"第一印象\"：因为躲在角落叫\"角落\"，因为第一天打碎花瓶叫\"碎碎\"。" },
        { table: 11, theme: "宠物", keyword: "社死现场", desc: "养宠社死高频事件：狗在公共场合做不雅动作、猫在视频会议屁股对准摄像头、鹦鹉在客人面前重复你骂它的话、狗在公园死活不走要你扛回家……这些社死却是养宠人独有的快乐素材。" },
        { table: 11, theme: "宠物", keyword: "治愈", desc: "研究证实：撸猫/狗10分钟，皮质醇下降23%，血压心率也降低。而且宠物不分时段——半夜加班崩溃时它还会蹭过来。这种\"24小时待命\"的治愈力无可替代。" },
        { table: 11, theme: "宠物", keyword: "出差焦虑", desc: "宠物\"分离焦虑\"不只是宠物的事——主人也焦虑。调查显示65%宠物主人出差时查看宠物摄像头频率超过查工作邮件。有人给宠物留录音，有人出差前\"心理建设\"……这份牵挂是真实的。" },
        { table: 11, theme: "宠物", keyword: "云养", desc: "\"云养宠物\"是低成本获取正面情绪的方式：获得快乐面不需承担铲屎/看病/焦虑。但很多云养的人最后都入了坑——视频终究替代不了摸到毛绒绒暖乎乎的那一刻。" },
        { table: 11, theme: "宠物", keyword: "如果可以", desc: "最受欢迎的\"幻想宠物\"Top 5：水獭（拉手手睡觉）、浣熊（搓东西的样子）、狐狸（耳朵大）、鹦鹉（会说话）、小熊猫（因为它就是小熊猫啊）。没有任何限制的话你想养什么？" },
        { table: 11, theme: "宠物", keyword: "性格", desc: "动物性格差异比想象的大。同一窝小猫可以完全不同：话多vs安静、粘人vs独立、大胆vs怕生。宠物行为学说55%取决于基因、30%取决于早期社会化、15%取决于后天环境。" },
        { table: 11, theme: "宠物", keyword: "花销", desc: "养宠\"冰山成本\"：可见的是粮食疫苗；水下是突发疾病、绝育、寄养费、被磨爪子的家具……据统计城市家猫终身成本约8-15万元。但问养宠人\"后悔吗\"，99%说不后悔。" },
        { table: 11, theme: "宠物", keyword: "告别", desc: "宠物平均寿命决定了大多数养宠人都要经历这一刻。心理学上宠物离世的悲伤等同于失去亲密家人。但好的告别也是成长——让我们学会在有限时间里珍惜陪伴，而不是等失去才意识到价值。" },
        { table: 11, theme: "宠物", keyword: "像主人", desc: "加州大学研究：人确实倾向选择长相相似的宠物——长发的人更可能养长毛狗，圆脸的人选圆脸猫。这叫\"相似性吸引效应\"。时间长了表情和作息都互相影响，\"越养越像\"有科学依据。" },

        // 桌12: 概率
        { table: 12, theme: "概率", keyword: "巧合", desc: "\"生日悖论\"：房间里只要23人，就有超过50%概率两人同天生日。很多\"不可思议的巧合\"其实概率比直觉以为的高——人类大脑天生不擅长评估概率，所以总觉得巧合是\"命运安排\"。" },
        { table: 12, theme: "概率", keyword: "A/B Test", desc: "互联网公司改个按钮颜色都要A/B测试——随机分两组看效果。但人生没有A/B测试：选了A就永远不知道B会怎样。统计师的浪漫：比谁都清楚对照组价值，也比谁都清楚人生没有对照组。" },
        { table: 12, theme: "概率", keyword: "赌徒谬误", desc: "\"连开10次红下次一定黑\"——经典赌徒谬误。每次轮盘转动都是独立事件。生活中也常犯：\"连面3家没过下家肯定能过\"——但每次面试也是独立事件。过去的失败不提高未来的成功率。" },
        { table: 12, theme: "概率", keyword: "蝴蝶效应", desc: "蝴蝶效应是气象学家洛伦兹1961年发现的：微小初始误差会被放大成完全不同的结果。人生也一样——随手投的简历、偶然参加的聚会、地铁上碰巧坐旁边的人——任何微小随机事件都可能改变轨迹。" },
        { table: 12, theme: "概率", keyword: "幸存者偏差", desc: "我们只看到\"活下来\"的样本：只看到创业成功故事没看到99%失败的；只看到辍学成功的比尔盖茨没看到找不到工作的。统计师比一般人更警惕：你看到的数据永远只是全貌的一部分。" },
        { table: 12, theme: "概率", keyword: "期望值", desc: "期望值=收益×概率。成功率10%但回报巨大的事，期望值可能比成功率90%但回报平平的更高。很多\"看起来冒险\"的决定算期望值其实是理性的。\"看起来稳妥\"的选择期望值可能很低。" },
        { table: 12, theme: "概率", keyword: "大数定律", desc: "抛硬币10次可能8次正面；抛1000次就接近50%。这就是大数定律——短期随机波动，长期趋向稳定。人生启示：单次失败说明不了什么，但坚持做\"正期望值\"的事足够多次，结果大概率不会差。" },
        { table: 12, theme: "概率", keyword: "贝叶斯更新", desc: "贝叶斯精髓：根据新证据不断更新信念，不死守第一印象。觉得同事不靠谱？如果连续3次交付超预期，你应该更新判断。一直不更新信念的人本质上在忽略数据——统计师的大忌。" },
        { table: 12, theme: "概率", keyword: "六度分隔", desc: "\"任何两人之间最多隔6人\"——Facebook数据验证平均只有3.57度。在我们这种专业圈子更小：临床统计圈可能只有2度——你认识的人认识的人就是对方。世界比你以为的小得多。" },
        { table: 12, theme: "概率", keyword: "黑天鹅", desc: "塔勒布定义的\"黑天鹅\"三特征：①极稀少 ②影响巨大 ③事后被合理化。2020疫情就是典型。启示：不要低估极端事件——它不常来，但来了就改变一切。" },
        { table: 12, theme: "概率", keyword: "随机漫步", desc: "\"随机漫步假说\"说股票短期走势本质不可预测。有人推广到职业——你以为是精心规划的结果可能只是随机机会的组合。接受\"很多事本质是随机的\"反而减轻焦虑：做好准备等风来就行。" },
        { table: 12, theme: "概率", keyword: "p < 0.05", desc: "统计师灵魂拷问：p=0.049和p=0.051有什么本质区别？答案：统计学上没有。0.05只是一条人为的线。但这条线关乎药能不能上市、论文能不能发表。统计显著性≠实际意义——统计师最想让全世界理解的一句话。" }
    ];

    let db = null;
    let currentResult = null;
    const STORAGE_KEY = 'teambuilding_2026_result';

    function init() {
        createParticles();
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) { currentResult = JSON.parse(saved); showAlreadyDrawn(); return; }
        if (firebaseConfig.apiKey && !firebaseConfig.apiKey.includes('YOUR_')) {
            try { firebase.initializeApp(firebaseConfig); db = firebase.database(); updateRemainingCount(); }
            catch (e) { enterDemoMode(); }
        } else { enterDemoMode(); }
    }

    function enterDemoMode() { db = null; document.getElementById('remaining-text').textContent = '🎮 演示模式 · 点击体验抽签效果'; }

    function updateRemainingCount() {
        if (!db) return;
        db.ref('drawn').on('value', (snapshot) => {
            const remaining = 144 - Object.keys(snapshot.val() || {}).length;
            document.getElementById('remaining-text').textContent = `剩余 ${remaining}/144 个名额`;
            if (remaining <= 0) { document.getElementById('btn-draw').classList.add('disabled'); document.getElementById('remaining-text').textContent = '名额已抽完'; }
        });
    }

    async function startDraw() {
        const btn = document.getElementById('btn-draw');
        if (btn.classList.contains('disabled')) return;
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) { currentResult = JSON.parse(saved); showAlreadyDrawn(); return; }
        btn.classList.add('disabled');
        showPage('page-animation');
        try {
            let result = db ? await drawFromFirebase() : ALL_KEYWORDS[Math.floor(Math.random() * ALL_KEYWORDS.length)];
            if (result) { currentResult = result; localStorage.setItem(STORAGE_KEY, JSON.stringify(result)); setTimeout(() => { showResult(result); triggerConfetti(); }, 1800); }
            else { showPage('page-landing'); showStatus('名额已抽完！', 'error'); btn.classList.remove('disabled'); }
        } catch (e) { showPage('page-landing'); showStatus('抽签失败，请重试', 'error'); btn.classList.remove('disabled'); }
    }

    function drawFromFirebase() {
        return new Promise((resolve, reject) => { const shuffled = [...Array(144).keys()].sort(() => Math.random() - 0.5); tryNext(shuffled, 0, resolve, reject); });
    }

    function tryNext(indices, i, resolve, reject) {
        if (i >= indices.length) { resolve(null); return; }
        db.ref('drawn/' + indices[i]).transaction((cur) => { if (cur === null) return { timestamp: firebase.database.ServerValue.TIMESTAMP, deviceId: getDeviceId() }; return; },
        (err, committed) => { if (err) reject(err); else if (committed) resolve(ALL_KEYWORDS[indices[i]]); else tryNext(indices, i+1, resolve, reject); });
    }

    function getDeviceId() { let id = localStorage.getItem('device_id'); if (!id) { id = 'dev_'+Date.now()+'_'+Math.random().toString(36).substr(2,9); localStorage.setItem('device_id', id); } return id; }

    function showResult(r) { document.getElementById('result-theme').textContent = `主题：${r.theme}`; document.getElementById('result-keyword').textContent = r.keyword; document.getElementById('result-desc').textContent = r.desc; showPage('page-result'); }

    function showAlreadyDrawn() { document.getElementById('already-theme').textContent = `主题：${currentResult.theme}`; document.getElementById('already-keyword').textContent = currentResult.keyword; document.getElementById('already-desc').textContent = currentResult.desc; showPage('page-already'); }

    function showTablemates() {
        if (!currentResult) return;
        const overlay = document.getElementById('popup-overlay');
        document.getElementById('popup-title').textContent = `🪑 你的同桌话题`;
        document.getElementById('popup-list').innerHTML = ALL_KEYWORDS.filter(k => k.table === currentResult.table).map(k =>
            `<li class="${k.keyword === currentResult.keyword ? 'me' : ''}">${k.keyword === currentResult.keyword ? '👉 ' : ''}${k.keyword}</li>`
        ).join('');
        overlay.classList.add('show');
    }

    function closePopup(e) { if (e.target === document.getElementById('popup-overlay')) { document.getElementById('popup-overlay').classList.remove('show'); } }

    function shareResult() {
        if (!currentResult) return;
        const text = `🎲 我抽到了一个有趣的话题！\n🏷️ ${currentResult.theme} · ${currentResult.keyword}\n💡 ${currentResult.desc}\n——2026台州团建`;
        if (navigator.share) navigator.share({ title: '今晚和谁吃？', text }).catch(()=>{});
        else { const ta = document.createElement('textarea'); ta.value = text; ta.style.cssText='position:fixed;left:-9999px'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast('已复制到剪贴板！'); }
    }

    function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function showStatus(msg, type) { const el = document.getElementById('status-msg'); el.textContent = msg; el.className = 'status-msg ' + type; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 5000); }
    function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 4000); }

    function createParticles() { const c = document.getElementById('particles'); for (let i=0;i<20;i++) { const p = document.createElement('div'); p.className='particle'; p.style.left=Math.random()*100+'%'; p.style.top=Math.random()*100+'%'; p.style.animationDelay=Math.random()*6+'s'; p.style.animationDuration=(4+Math.random()*4)+'s'; c.appendChild(p); } }

    function triggerConfetti() { const c = document.getElementById('confetti'); const colors=['#667eea','#764ba2','#f093fb','#f5576c','#ffd700','#00ff88']; for(let i=0;i<50;i++){const d=document.createElement('div');d.className='confetti';d.style.left=Math.random()*100+'%';d.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)];d.style.animationDelay=Math.random()*0.5+'s';d.style.borderRadius=Math.random()>0.5?'50%':'0';d.style.width=(5+Math.random()*10)+'px';d.style.height=(5+Math.random()*10)+'px';c.appendChild(d);}setTimeout(()=>c.innerHTML='',4000); }

    window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
